services:
  # MySQL Database (mesmo do leitura-ativos)
  mysql:
    image: mysql:8.0
    container_name: investment_orders_db
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: investment_orders
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - investment-network

  # LocalStack para SQS
  localstack:
    image: localstack/localstack:3.8
    container_name: localstack_sqs
    environment:
      - SERVICES=sqs
      - DEFAULT_REGION=sa-east-1
      - AWS_ACCESS_KEY_ID=teste
      - AWS_SECRET_ACCESS_KEY=teste
      - SQS_ENDPOINT_STRATEGY=path
      - DOCKER_HOST=unix:///var/run/docker.sock
      - SQS_DISABLE_MESSAGE_ID_VALIDATION=1

    ports:
      - "4566:4566"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock"
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:4566/_localstack/health" ]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - investment-network

  # Inicializador da fila SQS automático
  init-sqs:
    image: amazon/aws-cli
    container_name: init_sqs_queue
    depends_on:
      localstack:
        condition: service_healthy
    environment:
      - AWS_ACCESS_KEY_ID=teste
      - AWS_SECRET_ACCESS_KEY=teste
      - AWS_DEFAULT_REGION=sa-east-1
    entrypoint: >
      /bin/sh -c "
        aws sqs create-queue --queue-name orders-queue --endpoint-url=http://localstack:4566;
        echo '✅ Fila SQS orders-queue criada com sucesso!';
        exit 0;
      "
    networks:
      - investment-network

  # Worker Atualiza Ativos
  worker-atualiza-ativos:
    build: atualiza-ativos
    container_name: atualiza_ativos_worker
    environment:
      PORT: 62002
      QUOTATIONS_URL: http://host.docker.internal:3001/quotations
      POLL_INTERVAL_MS: 1000
      DB_POLL_INTERVAL_MS: 10000
      RETRY_ATTEMPTS: 3
      REDIS_URL: redis://redis:6379
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: app_user
      DB_PASSWORD: app_password
      DB_NAME: investment_orders
    ports:
      - "62002:62002"
    depends_on:
      mysql:
        condition: service_healthy
      localstack:
        condition: service_healthy
      init-sqs:
        condition: service_completed_successfully
    networks:
      - investment-network
    restart: unless-stopped

  # API Criar Ordens
  api-criar-ordens:
    build: criar-ordens-api
    container_name: criar_ordens_api
    environment:
      PORT: 62001
      # Conexão com MySQL usando nome do serviço (interno do Docker)
      DATABASE_URL: "mysql://app_user:app_password@mysql:3306/investment_orders"
      SQS_QUEUE_NAME: orders-queue
      SQS_ENDPOINT: http://localstack:4566
      AWS_REGION: sa-east-1
      AWS_ACCESS_KEY_ID: teste
      AWS_SECRET_ACCESS_KEY: teste
    ports:
      - "62001:62001"
    depends_on:
      mysql:
        condition: service_healthy
      localstack:
        condition: service_healthy
      init-sqs:
        condition: service_completed_successfully
    networks:
      - investment-network
    restart: unless-stopped

  # API Leitura de Ativos
  api-leitura-ativos:
    build: leitura-ativos
    container_name: leitura_ativos_api
    env_file:
      - ./leitura-ativos/.env
    environment:
      PORT: 62000
      # Conexão com MySQL usando nome do serviço (interno do Docker)
      DATABASE_URL: "mysql://app_user:app_password@mysql:3306/investment_orders"
      REDIS_URL: redis://redis:6379
      SQS_ENDPOINT: http://localstack:4566
      AWS_REGION: sa-east-1
      AWS_ACCESS_KEY_ID: teste
      AWS_SECRET_ACCESS_KEY: teste
    ports:
      - "62000:62000"
    depends_on:
      mysql:
        condition: service_healthy
      localstack:
        condition: service_healthy
      init-sqs:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - investment-network
    restart: unless-stopped

  # Lambda Processamento de Ordens
  lambda-processamento-ativos:
    build: processamento-ativos
    container_name: processamento_ativos_api
    environment:
      # Conexão com MySQL usando nome do serviço (interno do Docker)
      DATABASE_URL: "mysql://app_user:app_password@mysql:3306/investment_orders"
      SQS_ENDPOINT: http://localstack:4566
      SQS_QUEUE_NAME: orders-queue
      AWS_REGION: sa-east-1
      AWS_ACCESS_KEY_ID: teste
      AWS_SECRET_ACCESS_KEY: teste
    # Não expondo porta HTTP — é uma Lambda invocada via SQS (local)
    depends_on:
      mysql:
        condition: service_healthy
      localstack:
        condition: service_healthy
      init-sqs:
        condition: service_completed_successfully
    networks:
      - investment-network
    restart: unless-stopped

  # Redis para Cache (usado possivelmente pelo processamento-ativos)
  redis:
    image: redis:alpine
    container_name: investment_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - investment-network

  redisinsight:
    image: redislabs/redisinsight:latest
    container_name: redis_insight
    ports:
      - "5540:5540"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - investment-network

  init-redis:
    image: python:3.11-alpine
    container_name: init_redis
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_NAME=investment_orders
      - DB_USER=app_user
      - DB_PASSWORD=app_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    command: >
      /bin/sh -c "
        pip install pymysql redis --quiet &&
        python /scripts/init_redis.py
      "
    volumes:
      - ./scripts:/scripts
    networks:
      - investment-network

  proxysql:
    image: proxysql/proxysql:latest
    container_name: proxysql
    ports:
      - "6033:6033" # porta de conexão
      - "6032:6032" # porta admin
    volumes:
      - ./scripts/proxysql/proxysql.cnf:/etc/proxysql.cnf
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - investment-network

  prometheus:
    image: prom/prometheus:latest
    container_name: investment_prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-remote-write-receiver"
    ports:
      - "9090:9090"
    volumes:
      - ./scripts/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - investment-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: investment_grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./scripts/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./scripts/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - investment-network
    restart: unless-stopped

  k6:
    image: grafana/k6:latest
    profiles:
      - performance
    environment:
      TEST_TYPE: ${TEST_TYPE:-ramp}
      QUICK: ${QUICK:-true}
      MAX_VUS: ${MAX_VUS:-50}
      WRITE_PERCENT: ${WRITE_PERCENT:-10}
      THINK_TIME_SECONDS: ${THINK_TIME_SECONDS:-1}
      TARGET_ORDER_RPS: ${TARGET_ORDER_RPS:-1000}
      TARGET_QUOTATION_RPS: ${TARGET_QUOTATION_RPS:-10000}
      TARGET_CONCURRENT_USERS: ${TARGET_CONCURRENT_USERS:-50000}
      TARGET_DURATION: ${TARGET_DURATION:-}
      READ_BASE_URL: http://api-leitura-ativos:62000
      WRITE_BASE_URL: http://api-criar-ordens:62001
      K6_PROMETHEUS_RW_SERVER_URL: http://prometheus:9090/api/v1/write
      K6_PROMETHEUS_RW_TREND_AS_NATIVE_HISTOGRAM: "false"
      K6_PROMETHEUS_RW_TREND_STATS: "p(90),p(95),p(99),avg,max"
      K6_PROMETHEUS_RW_PUSH_INTERVAL: 5s
    command:
      - run
      - -o
      - experimental-prometheus-rw
      - /scripts/orders-load-test.js
    volumes:
      - ./scripts/performance:/scripts:ro
    depends_on:
      - prometheus
      - api-leitura-ativos
      - api-criar-ordens
    networks:
      - investment-network
volumes:
  mysql_data:
  localstack_data:
  prometheus_data:
  grafana_data:

networks:
  investment-network:
    driver: bridge
